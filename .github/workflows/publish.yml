name: build-and-publish-terminal

on:
  schedule:
    - cron: "40 23 * * *"   # ~after US daily close, 02:40 Israel time
    - cron: "0 6 * * *"     # morning refresh, 09:00 Israel time
  workflow_dispatch: {}      # manual run button

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy
      - run: python build_site.py
      - name: commit forward-test journal
        run: |
          git config user.name "terminal-bot"
          git config user.email "terminal-bot@users.noreply.github.com"
          git add forward_log.csv
          git diff --cached --quiet || git commit -m "journal: daily state"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
